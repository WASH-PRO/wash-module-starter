<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Module Starter</title>
  <link rel="stylesheet" href="wash-module-ui.css" />
</head>
<body class="wm-body">
  <div id="wm-app"></div>
  <script src="wash-module-sdk.js"></script>
  <script>
    WashModule.createPage({
      moduleId: 'module-starter',
      accent: '#059669',
      refreshInterval: 10000,
      title: { ru: 'Стартер модуля', en: 'Module starter' },
      subtitle: {
        ru: 'Шаблон для разработки: heartbeat в data/ и пример страницы настроек.',
        en: 'Development template: heartbeat in data/ and sample settings page.',
      },
      settingsHtml: `
        <div class="wm-field">
          <label class="wm-field-label" for="poll_interval">${WashModule.t({ ru: 'Интервал (сек)', en: 'Interval (sec)' })}</label>
          <input class="wm-input" id="poll_interval" type="number" name="poll_interval" min="10" max="600" />
          <span class="wm-field-hint">${WashModule.t({ ru: 'Период записи heartbeat в data/.', en: 'Heartbeat write interval to data/.' })}</span>
        </div>
        <div class="wm-field">
          <label class="wm-field-label" for="greeting">${WashModule.t({ ru: 'Приветствие', en: 'Greeting' })}</label>
          <input class="wm-input" id="greeting" type="text" name="greeting" />
          <span class="wm-field-hint">${WashModule.t({ ru: 'Текст в снимке состояния модуля.', en: 'Text shown in the module snapshot.' })}</span>
        </div>`,
      collectSettings(form) {
        return {
          poll_interval: Number(form.poll_interval.value),
          greeting: String(form.greeting.value || ''),
        };
      },
      applySettings(settings, form) {
        form.poll_interval.value = settings.poll_interval ?? 30;
        form.greeting.value = settings.greeting ?? '';
      },
      metrics(snap, status) {
        if (!snap || !snap.recordedAt) return [];
        return [
          { label: WashModule.t({ ru: 'Heartbeat', en: 'Heartbeat' }), value: WashModule.formatDateTime(snap.recordedAt), accent: true },
          { label: WashModule.t({ ru: 'Tick', en: 'Tick' }), value: snap.tick != null ? snap.tick : '—' },
          { label: WashModule.t({ ru: 'Интервал', en: 'Interval' }), value: snap.pollInterval != null ? `${snap.pollInterval}s` : '—' },
        ];
      },
      renderOverview(snap, status) {
        if (!snap || !snap.recordedAt) {
          const running = status && (status.activeRunStatus === 'running' || (status.state && status.state.status === 'running'));
          const hint = running
            ? WashModule.t({ ru: 'Ожидание первого heartbeat…', en: 'Waiting for the first heartbeat…' })
            : WashModule.t({ ru: 'Нет снимка — запустите модуль.', en: 'No snapshot yet — start the module.' });
          return `<div class="wm-empty">${WashModule.escapeHtml(hint)}</div>`;
        }
        const greeting = snap.greeting ? WashModule.escapeHtml(snap.greeting) : '—';
        return `
          <div class="wm-card" style="margin-bottom:0.75rem">
            <strong>${WashModule.t({ ru: 'Текущее приветствие', en: 'Current greeting' })}</strong>
            <p style="margin:0.35rem 0 0">${greeting}</p>
          </div>
          <h2 class="wm-section-title">${WashModule.t({ ru: 'Структура модуля', en: 'Module layout' })}</h2>
          <ul class="wm-list">
            <li><code>wash-module.json</code> — ${WashModule.t({ ru: 'манифест', en: 'manifest' })}</li>
            <li><code>src/main.py</code> — ${WashModule.t({ ru: 'daemon в PyOrchestrator', en: 'PyOrchestrator daemon' })}</li>
            <li><code>ui/index.html</code> — ${WashModule.t({ ru: 'эта страница', en: 'this page' })}</li>
            <li><code>data/</code> — ${WashModule.t({ ru: 'настройки и снимки', en: 'settings and snapshots' })}</li>
          </ul>
          <h2 class="wm-section-title" style="margin-top:1rem">Snapshot</h2>
          <pre class="wm-code">${WashModule.escapeHtml(snap ? JSON.stringify(snap, null, 2) : '—')}</pre>`;
      },
    });
  </script>
</body>
</html>
